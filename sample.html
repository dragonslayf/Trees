<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简单网页</title>
  <style>
    h1 {
      color: red;
      font-size: 50px;
    }
    .inp {
      width: 200px;
      height: 30px;
      border: 1px solid #ccc;
    }
  </style>
  <script>
    console.log("hello, inline method");
    alert("Have a good day!");
  </script>
  <script src="myscript.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>欢迎来到我的简单网页！</h1>
  <script>
    console.log("Hello World");
  </script>
  <button id="helloBtn">点击我</button>
  <a href="https://www.baidu.com", target="_blank">百度</a>
  <p id="message"></p>
  <form action="">
    <input type="text" class="inp" name="username" placeholder="请输入用户名">
  </form>
</body>
</html>
